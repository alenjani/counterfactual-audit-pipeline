# MVP run — small-scale validation that the full pipeline works end-to-end.
# 50 seed identities × 12 counterfactual variations (6 skin tones × 2 genders) = 600 images.
# 1 auditor (DeepFace, free + local) for fastest iteration.
#
# Hardware target: 4× L4 GPUs on Databricks (cluster 6106-192556-lj0uddmy)
# Expected runtime: ~75 min on 4 actors (warm Volume cache), ~3-5 hr on 1 GPU.
#
# Validated against the smoke notebook (notebooks/01_databricks_ray_smoke.ipynb)
# on 2026-04-28: NF4 + Flux + ControlNet + PuLID + antelopev2 + 1024² fits the L4.

run_id: mvp_${env:USER}_${date:%Y%m%d}
seed: 42

paths:
  # Volume-backed paths (CLAUDE.md storage tier "working storage").
  # FairFace seed dataset still local-disk; small (~2 GB).
  seed_dataset: data/fairface
  output_dir: /Volumes/ds_work/alenj00/cap_cache/runs/mvp
  generated_dir: /Volumes/ds_work/alenj00/cap_cache/runs/mvp/generated
  audit_dir: /Volumes/ds_work/alenj00/cap_cache/runs/mvp/audit
  analysis_dir: /Volumes/ds_work/alenj00/cap_cache/runs/mvp/analysis
  viz_dir: /Volumes/ds_work/alenj00/cap_cache/runs/mvp/viz

generator:
  backend: flux_pulid_controlnet
  device: cuda
  dtype: nf4                         # NF4 fits the full pipeline on a 24 GB L4.
                                     # FP8 OOMs at 1024². Per CLAUDE.md item 4.
  controlnet_mode: pose              # required; canny/depth would confound
                                     # demographic-correlated edges.
  face_model_name: antelopev2        # ArcFace r100 + WebFace42M; required for
                                     # tight identity-preservation measurement.
  num_inference_steps: 28
  guidance_scale: 3.5
  width: 1024
  height: 1024

seed_identities:
  source: fairface
  count: 50
  stratify_by: [race, gender, age]   # balanced sample

counterfactual_axes:
  skin_tone: [1, 2, 3, 4, 5, 6]      # Fitzpatrick I–VI
  gender: [male, female]

fixed_attributes:
  pose: frontal
  expression: neutral expression
  lighting: soft even studio lighting

validators:
  identity:
    enabled: true
    threshold: 0.5
  fid:
    enabled: false                   # skip for MVP
  attributes:
    enabled: true

auditors:
  - name: deepface
    kwargs:
      detector_backend: retinaface

tasks:
  - gender
  - age

analysis:
  fdr_alpha: 0.05
  bootstrap_iters: 1000

viz:
  formats: [pdf, png]
  dpi: 300
  build_interactive_dashboard: true
